name: Build & Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# ─────────────────────────────────────────────────────────────────────────────
# Triggers:
#   • Push a tag like v1.2.3  → full build + GitHub Release + VT scan
#   • workflow_dispatch        → manual trigger (build artifacts only)
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write      # create GitHub Releases, update release body
  id-token: write      # GitHub OIDC → Sigstore build attestation (SLSA)
  attestations: write  # store build provenance attestation

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 1 — Test gate on all three platforms
  # ═══════════════════════════════════════════════════════════════════════════
  verify:
    name: Verify (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-latest, windows-2025]

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Linux test dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            gir1.2-gtk-3.0 gir1.2-webkit2-4.0 libwebkit2gtk-4.0-37 \
            libgirepository1.0-dev gcc libcairo2-dev pkg-config python3-dev libglib2.0-dev \
            libegl1 libxcb-cursor0 libxcb-xinerama0 libxcb-icccm4 \
            libxcb-image0 libxcb-keysyms1 libxcb-render-util0 libxcb-shape0

      - name: Install liboqs C library
        uses: ./.github/actions/install-liboqs
        with:
          version: "0.15.0"
          install-prefix: ${{ runner.temp }}/_oqs

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --require-hashes -r requirements.lock
          python -m pip install --require-hashes -r requirements-dev.lock

      - name: Audit locked dependencies
        run: python -m pip_audit -r requirements.lock -r requirements-dev.lock

      - name: Run tests
        run: python -m pytest paracci/tests -q
        env:
          QT_QPA_PLATFORM: offscreen

      - name: Run clipboard JavaScript tests
        run: node --test paracci/tests/test_session_clipboard.mjs

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 2 — Build on all three platforms in parallel
  # ═══════════════════════════════════════════════════════════════════════════
  build:
    name: Build (${{ matrix.platform_id }})
    needs: [verify]
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2025
            platform_id: windows
            artifact_name: Paracci-Windows

          - os: macos-latest
            platform_id: macos
            artifact_name: Paracci-macOS

          - os: ubuntu-22.04
            platform_id: linux
            artifact_name: Paracci-Linux

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      # ── 2. Set up Python ───────────────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"
          cache: "pip"

      # ── 3. Linux: GTK3 + WebKit2GTK system packages ────────────────────────
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            python3-gi python3-gi-cairo \
            gir1.2-gtk-3.0 gir1.2-webkit2-4.0 libwebkit2gtk-4.0-37 \
            gstreamer1.0-plugins-base gstreamer1.0-plugins-good \
            libgirepository1.0-dev gcc libcairo2-dev \
            pkg-config python3-dev libglib2.0-dev \
            libegl1 libxcb-cursor0 libxcb-xinerama0 \
            dpkg desktop-file-utils shared-mime-info xvfb zip

      - name: Download pinned Linux packaging tools
        if: runner.os == 'Linux'
        shell: bash
        run: |
          curl -fsSLo "$RUNNER_TEMP/appimagetool.AppImage" \
            "https://github.com/AppImage/appimagetool/releases/download/1.9.0/appimagetool-x86_64.AppImage"
          echo "46fdd785094c7f6e545b61afcfb0f3d98d8eab243f644b4b17698c01d06083d1  $RUNNER_TEMP/appimagetool.AppImage" | sha256sum -c -

          curl -fsSLo "$RUNNER_TEMP/runtime-x86_64" \
            "https://github.com/AppImage/type2-runtime/releases/download/continuous/runtime-x86_64"
          echo "a2419dce47568395ae79c01ffa9a5a341dd339581352ff104d073527543177e5  $RUNNER_TEMP/runtime-x86_64" | sha256sum -c -

          chmod +x "$RUNNER_TEMP/appimagetool.AppImage"
          {
            echo "APPIMAGETOOL=$RUNNER_TEMP/appimagetool.AppImage"
            echo "APPIMAGE_RUNTIME_FILE=$RUNNER_TEMP/runtime-x86_64"
          } >> "$GITHUB_ENV"

      - name: Install liboqs C library
        id: liboqs
        uses: ./.github/actions/install-liboqs
        with:
          version: "0.15.0"
          install-prefix: ${{ runner.temp }}/_oqs

      # ── 4. Install runtime + build dependencies ────────────────────────────
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --require-hashes -r requirements.lock

      - name: Install PyInstaller (Standard for macOS)
        if: runner.os == 'macOS'
        run: |
          python -m pip install --require-hashes -r requirements-dev.lock

      - name: Install PyInstaller (Compile from Source for Windows and Linux to eliminate False Positives)
        if: runner.os != 'macOS'
        run: |
          python -m pip install --require-hashes --no-binary pyinstaller -r requirements-dev.lock

      - name: Audit locked dependencies
        run: python -m pip_audit -r requirements.lock -r requirements-dev.lock

      - name: Install Inno Setup 6.7.1
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install innosetup --version=6.7.1 --no-progress -y

      - name: Verify canonical release metadata
        shell: bash
        env:
          RELEASE_TAG: ${{ github.ref_name }}
          IS_RELEASE_TAG: ${{ startsWith(github.ref, 'refs/tags/v') }}
        run: |
          python - <<'PY'
          import os, re
          from pathlib import Path

          version = Path("VERSION").read_text(encoding="ascii").strip()
          if not re.fullmatch(r"\d+\.\d+\.\d+", version):
              raise SystemExit(f"VERSION must contain MAJOR.MINOR.PATCH, got {version!r}")
          tag = os.environ["RELEASE_TAG"]
          if os.environ["IS_RELEASE_TAG"] == "true" and tag != f"v{version}":
              raise SystemExit(f"Release tag {tag!r} does not match canonical VERSION v{version}.")
          build_info = Path("paracci/app/build_info.py").read_text(encoding="utf-8")
          protocol_match = re.search(r"SESSION_PROTOCOL_VERSION\s*=\s*(\d+)", build_info)
          if not protocol_match:
              raise SystemExit("SESSION_PROTOCOL_VERSION is missing from build_info.py")
          marker = f'<!-- paracci-update: {{"protocol_version": {protocol_match.group(1)}}} -->'
          workflow = Path(".github/workflows/release.yml").read_text(encoding="utf-8")
          if marker not in workflow:
              raise SystemExit(f"Release protocol marker is not synchronized: {marker}")
          print(f"Verified canonical Paracci version {version}")
          PY

      # ── 5. Build executable ────────────────────────────────────────────────
      - name: Build executable and installer (Windows)
        if: runner.os == 'Windows'
        run: python build.py --clean --installer
        env:
          QT_QPA_PLATFORM: offscreen

      - name: Build executable and DMG (macOS)
        if: runner.os == 'macOS'
        run: python build.py --clean --dmg
        env:
          QT_QPA_PLATFORM: offscreen

      - name: Build executable, AppImage, and Debian package (Linux)
        if: runner.os == 'Linux'
        run: python build.py --clean --appimage --deb
        env:
          QT_QPA_PLATFORM: offscreen   # suppress headless Qt warnings on Linux CI

      - name: Smoke test packaged ML-KEM
        shell: bash
        run: |
          python - <<'PY'
          import http.cookiejar
          import os
          import queue
          import re
          import shutil
          import socket
          import subprocess
          import sys
          import tempfile
          import threading
          import time
          import urllib.parse
          import urllib.request
          from pathlib import Path

          runner_os = os.environ["RUNNER_OS"]
          if runner_os == "Windows":
              executable = Path("builds/windows/Paracci/Paracci.exe")
          elif runner_os == "macOS":
              app_executable = Path("builds/macos/Paracci.app/Contents/MacOS/Paracci")
              executable = app_executable if app_executable.exists() else Path("builds/macos/Paracci")
          else:
              executable = Path("builds/linux/Paracci/Paracci")

          if not executable.exists():
              raise SystemExit(f"Packaged executable not found: {executable}")

          with socket.socket(socket.AF_INET, socket.SOCK_STREAM) as probe:
              probe.bind(("127.0.0.1", 0))
              port = probe.getsockname()[1]
          token = None
          origin = f"http://127.0.0.1:{port}"
          data_root = Path(tempfile.mkdtemp(prefix="paracci-smoke-")).resolve()

          env = os.environ.copy()
          env.pop("PARACCI_LOOPBACK_TOKEN", None)
          for name in (
              "OQS_INSTALL_PATH",
              "LIBOQS_LIB_DIR",
              "LD_LIBRARY_PATH",
              "DYLD_LIBRARY_PATH",
          ):
              env.pop(name, None)
          env["PATH"] = os.pathsep.join(
              part
              for part in env.get("PATH", "").split(os.pathsep)
              if "_oqs" not in part.lower() and "liboqs" not in part.lower()
          )
          env["DATA_DIR"] = str(data_root / "data")
          env["PYOQS_VERSION"] = "paracci-smoke-no-autoinstall"
          env["QT_QPA_PLATFORM"] = "offscreen"

          proc = subprocess.Popen(
              [str(executable), "--no-gui", "--port", str(port)],
              env=env,
              stdout=subprocess.PIPE,
              stderr=subprocess.STDOUT,
              text=True,
              errors="replace",
          )

          output_lines = []
          output_events = queue.Queue()

          def collect_output():
              if proc.stdout:
                  for line in proc.stdout:
                      output_lines.append(line)
                      output_events.put(line)

          output_thread = threading.Thread(target=collect_output, daemon=True)
          output_thread.start()

          def stop_process():
              if proc.poll() is None:
                  proc.terminate()
                  try:
                      proc.wait(timeout=10)
                  except subprocess.TimeoutExpired:
                      proc.kill()
                      proc.wait(timeout=10)

          def redact(text):
              redacted = re.sub(r"([?&]token=)[^&\s]+", r"\1<redacted>", text)
              return redacted.replace(token, "<redacted>") if token else redacted

          def output_tail():
              return redact("".join(output_lines)[-4000:])

          def fail(message):
              stop_process()
              output_thread.join(timeout=1)
              raise SystemExit(f"{message}\n--- packaged app output ---\n{output_tail()}")

          try:
              deadline = time.time() + 90
              while token is None and time.time() < deadline:
                  if proc.poll() is not None:
                      fail(f"Packaged app exited early with code {proc.returncode}")
                  try:
                      line = output_events.get(timeout=0.25)
                  except queue.Empty:
                      continue
                  marker = "http://127.0.0.1:"
                  if marker not in line or "/__paracci_bootstrap?" not in line:
                      continue
                  entrypoint = urllib.parse.urlparse(line.strip())
                  candidate = urllib.parse.parse_qs(entrypoint.query).get("token", [""])[0]
                  if (
                      entrypoint.scheme != "http"
                      or entrypoint.hostname != "127.0.0.1"
                      or entrypoint.port != port
                      or entrypoint.path != "/__paracci_bootstrap"
                      or not candidate
                  ):
                      fail("Packaged app printed an invalid authenticated entrypoint")
                  token = candidate
              if token is None:
                  fail("Timed out waiting for packaged app authenticated entrypoint")

              while time.time() < deadline:
                  if proc.poll() is not None:
                      fail(f"Packaged app exited early with code {proc.returncode}")
                  try:
                      with socket.create_connection(("127.0.0.1", port), timeout=1):
                          break
                  except OSError:
                      time.sleep(1)
              else:
                  fail("Timed out waiting for packaged app to listen")

              jar = http.cookiejar.CookieJar()
              opener = urllib.request.build_opener(urllib.request.HTTPCookieProcessor(jar))

              def request(path, form=None, csrf=None):
                  headers = {"Host": f"127.0.0.1:{port}", "Origin": origin}
                  data = None
                  if form is not None:
                      data = urllib.parse.urlencode(form).encode("utf-8")
                      headers["Content-Type"] = "application/x-www-form-urlencoded"
                      headers["X-Paracci-Token"] = token
                      if csrf:
                          headers["X-CSRF-Token"] = csrf
                  req = urllib.request.Request(origin + path, data=data, headers=headers)
                  return opener.open(req, timeout=45)

              response = request(f"/__paracci_bootstrap?token={urllib.parse.quote(token)}&next=/")
              html = response.read().decode("utf-8", "replace")
              csrf_match = re.search(r'name="paracci-csrf-token"\s+content="([^"]+)"', html)
              if not csrf_match:
                  response = request("/unlock")
                  html = response.read().decode("utf-8", "replace")
                  csrf_match = re.search(r'name="paracci-csrf-token"\s+content="([^"]+)"', html)
              if not csrf_match:
                  fail("Could not extract CSRF token from packaged app")

              csrf = csrf_match.group(1)
              request("/unlock", {"pin": "Correct-Horse-95175328"}, csrf).read()
              request("/unlock/2fa/setup", {"action": "skip"}, csrf).read()
              response = request(
                  "/session/new",
                  {
                      "label": "Release smoke",
                      "session_ttl": "0",
                  },
                  csrf,
              )
              body = response.read().decode("utf-8", "replace")
              final_url = response.geturl()

              if "/session/" not in final_url:
                  snippet = re.sub(r"\s+", " ", body)[:1000]
                  fail(f"ML-KEM session creation did not complete. Final URL: {final_url}. Body: {snippet}")

              print(f"Packaged ML-KEM smoke test passed: {final_url}")
          finally:
              stop_process()
              output_thread.join(timeout=1)
              shutil.rmtree(data_root, ignore_errors=True)
          PY

      # ── 6. Normalize output path and compute SHA-256 ───────────────────────
      - name: Validate Linux distribution packages
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          appimages=(builds/linux/Paracci-*-x86_64.AppImage)
          debs=(builds/linux/paracci_*_amd64.deb)
          [ "${#appimages[@]}" -eq 1 ] && [ -f "${appimages[0]}" ]
          [ "${#debs[@]}" -eq 1 ] && [ -f "${debs[0]}" ]
          test -x "${appimages[0]}"

          desktop-file-validate installer/linux/paracci.desktop
          python - <<'PY'
          from pathlib import Path
          from xml.etree import ElementTree
          ElementTree.parse(Path("installer/linux/application-x-paracci.xml"))
          PY

          extract_dir="$RUNNER_TEMP/paracci-appimage-extract"
          mkdir -p "$extract_dir"
          (
            cd "$extract_dir"
            "$GITHUB_WORKSPACE/${appimages[0]}" --appimage-extract >/dev/null
          )
          test -x "$extract_dir/squashfs-root/AppRun"
          test -f "$extract_dir/squashfs-root/usr/share/applications/paracci.desktop"
          test -f "$extract_dir/squashfs-root/usr/share/mime/packages/application-x-paracci.xml"
          grep -q 'MimeType=application/x-paracci;' "$extract_dir/squashfs-root/usr/share/applications/paracci.desktop"

          dpkg-deb --info "${debs[0]}" >/dev/null
          sudo dpkg -i "${debs[0]}"
          test -x /opt/paracci/Paracci
          test -L /usr/local/bin/paracci
          test -f /usr/share/applications/paracci.desktop
          test -f /usr/share/mime/packages/application-x-paracci.xml
          test ! -e /opt/paracci/data
          sudo dpkg -r paracci
          test ! -e /opt/paracci
          test ! -e /usr/local/bin/paracci
          test ! -e /usr/share/applications/paracci.desktop
          test ! -e /usr/share/mime/packages/application-x-paracci.xml

          status=0
          APPIMAGE_EXTRACT_AND_RUN=1 timeout 20s xvfb-run -a "${appimages[0]}" \
            > "$RUNNER_TEMP/paracci-appimage-gui.log" 2>&1 || status=$?
          if [ "$status" -ne 124 ]; then
            cat "$RUNNER_TEMP/paracci-appimage-gui.log"
            echo "Expected the AppImage GUI process to remain active until timeout; status=$status" >&2
            exit 1
          fi

      - name: Validate macOS DMG
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          dmgs=(builds/macos/Paracci-*-macOS.dmg)
          [ "${#dmgs[@]}" -eq 1 ] && [ -f "${dmgs[0]}" ]
          hdiutil verify "${dmgs[0]}"

      - name: Prepare asset (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $runtimeDll = "builds\windows\Paracci\_internal\python312.dll"
          if (-not (Test-Path -LiteralPath $runtimeDll -PathType Leaf)) {
            throw "Windows onedir payload is missing Python runtime DLL: $runtimeDll"
          }
          $setups = @(Get-ChildItem "builds\windows\Paracci-Setup-v*.exe")
          if ($setups.Count -ne 1) {
            throw "Expected one Windows setup executable, found $($setups.Count)."
          }

          $setup = $setups[0]
          if ($setup.BaseName -notmatch '^Paracci-Setup-v(.+)$') {
            throw "Could not determine installer version from $($setup.Name)."
          }
          $version = $Matches[1]
          $portableDir = "builds\windows\Paracci-Portable-v$version"
          $portableZip = "builds\windows\Paracci-Portable-v$version.zip"

          Copy-Item "builds\windows\Paracci" $portableDir -Recurse -Force
          New-Item -Path (Join-Path $portableDir "data") -ItemType Directory -Force | Out-Null
          Compress-Archive -Path $portableDir -DestinationPath $portableZip -Force
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $archive = [System.IO.Compression.ZipFile]::OpenRead($portableZip)
          try {
            $expectedRuntimeEntry = "Paracci-Portable-v$version/_internal/python312.dll"
            $hasRuntimeDll = $null -ne ($archive.Entries | Where-Object {
              $_.FullName.Replace('\', '/') -eq $expectedRuntimeEntry
            } | Select-Object -First 1)
            if (-not $hasRuntimeDll) {
              throw "Windows portable archive is missing Python runtime DLL: $expectedRuntimeEntry"
            }
          } finally {
            $archive.Dispose()
          }
          Remove-Item $portableDir -Recurse -Force

          $setupHash = (Get-FileHash $setup.FullName -Algorithm SHA256).Hash.ToLower()
          $portableHash = (Get-FileHash $portableZip -Algorithm SHA256).Hash.ToLower()
          @(
            "$setupHash  $($setup.Name)"
            "$portableHash  $(Split-Path $portableZip -Leaf)"
          ) | Out-File -Encoding utf8 "builds\windows\SHA256SUMS.txt"
          Write-Host "SHA256 $($setup.Name): $setupHash"
          Write-Host "SHA256 $(Split-Path $portableZip -Leaf): $portableHash"

      - name: Prepare asset (macOS)
        if: runner.os == 'macOS'
        run: |
          dmgs=(builds/macos/Paracci-*-macOS.dmg)
          [ "${#dmgs[@]}" -eq 1 ] && [ -f "${dmgs[0]}" ]
          if [ -d "builds/macos/Paracci.app" ]; then
            cd builds/macos
            zip -r Paracci-macOS.zip Paracci.app
            sha256sum Paracci-macOS.zip Paracci-*-macOS.dmg > SHA256SUMS.txt
            rm -rf Paracci.app
          else
            chmod +x builds/macos/Paracci
            cd builds/macos
            mv Paracci Paracci-macOS
            sha256sum Paracci-macOS Paracci-*-macOS.dmg > SHA256SUMS.txt
          fi

      - name: Prepare asset (Linux)
        if: runner.os == 'Linux'
        run: |
          appimages=(builds/linux/Paracci-*-x86_64.AppImage)
          debs=(builds/linux/paracci_*_amd64.deb)
          [ "${#appimages[@]}" -eq 1 ] && [ -f "${appimages[0]}" ]
          [ "${#debs[@]}" -eq 1 ] && [ -f "${debs[0]}" ]
          test -x builds/linux/Paracci/Paracci
          chmod +x builds/linux/Paracci/Paracci "${appimages[0]}"
          cd builds/linux
          zip -qr Paracci-Linux.zip Paracci
          zip -T Paracci-Linux.zip
          sha256sum Paracci-Linux.zip Paracci-*-x86_64.AppImage paracci_*_amd64.deb > SHA256SUMS.txt
          rm -rf Paracci
          
      # ── 7. GitHub Build Provenance Attestation (Sigstore / SLSA L2) ────────
      #    Generates a cryptographically signed attestation that this binary
      #    was built from THIS specific commit in THIS repository.
      #    Verifiable at: https://github.com/<owner>/<repo>/attestations
      - name: Attest Windows installer provenance
        if: runner.os == 'Windows' && startsWith(github.ref, 'refs/tags/v')
        uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45  # v2
        with:
          subject-path: builds/windows/Paracci-Setup-v*.exe

      - name: Attest Windows portable archive provenance
        if: runner.os == 'Windows' && startsWith(github.ref, 'refs/tags/v')
        uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45  # v2
        with:
          subject-path: builds/windows/Paracci-Portable-v*.zip

      - name: Attest macOS build provenance
        if: runner.os == 'macOS' && startsWith(github.ref, 'refs/tags/v')
        uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45  # v2
        with:
          subject-path: builds/macos/Paracci-macOS*

      - name: Attest macOS DMG provenance
        if: runner.os == 'macOS' && startsWith(github.ref, 'refs/tags/v')
        uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45  # v2
        with:
          subject-path: builds/macos/Paracci-*-macOS.dmg

      - name: Attest Linux portable archive provenance
        if: runner.os == 'Linux' && startsWith(github.ref, 'refs/tags/v')
        uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45  # v2
        with:
          subject-path: builds/linux/Paracci-Linux.zip

      - name: Attest Linux AppImage provenance
        if: runner.os == 'Linux' && startsWith(github.ref, 'refs/tags/v')
        uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45  # v2
        with:
          subject-path: builds/linux/Paracci-*-x86_64.AppImage

      - name: Attest Linux Debian package provenance
        if: runner.os == 'Linux' && startsWith(github.ref, 'refs/tags/v')
        uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45  # v2
        with:
          subject-path: builds/linux/paracci_*_amd64.deb

      # ── 8. Upload artifacts ────────────────────────────────────────────────
      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: Paracci-Windows
          path: builds/windows/
          retention-days: 7

      - name: Upload artifact (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: Paracci-macOS
          path: builds/macos/
          retention-days: 7

      - name: Upload artifact (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: Paracci-Linux
          path: builds/linux/
          retention-days: 7

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 3 — Create GitHub Release
  # Runs only on version tags, after all builds succeed.
  # ═══════════════════════════════════════════════════════════════════════════
  release:
    name: Create Draft GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout repository metadata
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Download Windows artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: Paracci-Windows
          path: release-assets/windows

      - name: Download macOS artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: Paracci-macOS
          path: release-assets/macos

      - name: Download Linux artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: Paracci-Linux
          path: release-assets/linux

      # ── Merge per-platform SHA256 into one canonical file ──────────────────
      - name: Generate combined SHA256SUMS.txt
        run: |
          cat release-assets/windows/SHA256SUMS.txt \
              release-assets/macos/SHA256SUMS.txt \
              release-assets/linux/SHA256SUMS.txt \
            > SHA256SUMS.txt
          echo "=== SHA256SUMS.txt ==="
          cat SHA256SUMS.txt

      # ── Resolve final file names ────────────────────────────────────────────
      - name: Resolve release files
        id: resolve
        run: |
          PACKAGE_VERSION="$(tr -d '\r\n' < VERSION)"
          if [ "$GITHUB_REF_NAME" != "v$PACKAGE_VERSION" ]; then
            echo "Release tag $GITHUB_REF_NAME does not match canonical VERSION v$PACKAGE_VERSION." >&2
            exit 1
          fi
          WIN_SETUP_FILE="$(find release-assets/windows -maxdepth 1 -name 'Paracci-Setup-v*.exe' -print -quit)"
          WIN_PORTABLE_FILE="$(find release-assets/windows -maxdepth 1 -name 'Paracci-Portable-v*.zip' -print -quit)"
          LINUX_ZIP_FILE="$(find release-assets/linux -maxdepth 1 -name 'Paracci-Linux.zip' -print -quit)"
          LINUX_APPIMAGE_FILE="$(find release-assets/linux -maxdepth 1 -name 'Paracci-*-x86_64.AppImage' -print -quit)"
          LINUX_DEB_FILE="$(find release-assets/linux -maxdepth 1 -name 'paracci_*_amd64.deb' -print -quit)"
          MACOS_DMG_FILE="$(find release-assets/macos -maxdepth 1 -name 'Paracci-*-macOS.dmg' -print -quit)"
          if [ -z "$WIN_SETUP_FILE" ] || [ -z "$WIN_PORTABLE_FILE" ] || \
             [ -z "$LINUX_ZIP_FILE" ] || [ -z "$LINUX_APPIMAGE_FILE" ] || \
             [ -z "$LINUX_DEB_FILE" ] || \
             [ -z "$MACOS_DMG_FILE" ]; then
            echo "Missing one or more required distribution package release files." >&2
            exit 1
          fi
          chmod +x "$LINUX_APPIMAGE_FILE"

          # macOS: .zip bundle or bare binary
          if [ -f "release-assets/macos/Paracci-macOS.zip" ]; then
            MACOS_FILE="release-assets/macos/Paracci-macOS.zip"
          else
            MACOS_FILE="release-assets/macos/Paracci-macOS"
            chmod +x "$MACOS_FILE"
          fi

          echo "win_setup_file=$WIN_SETUP_FILE" >> $GITHUB_OUTPUT
          echo "win_portable_file=$WIN_PORTABLE_FILE" >> $GITHUB_OUTPUT
          echo "macos_file=$MACOS_FILE" >> $GITHUB_OUTPUT
          echo "macos_dmg_file=$MACOS_DMG_FILE" >> $GITHUB_OUTPUT
          echo "linux_zip_file=$LINUX_ZIP_FILE" >> $GITHUB_OUTPUT
          echo "linux_appimage_file=$LINUX_APPIMAGE_FILE" >> $GITHUB_OUTPUT
          echo "linux_deb_file=$LINUX_DEB_FILE" >> $GITHUB_OUTPUT
          echo "package_version=$PACKAGE_VERSION" >> $GITHUB_OUTPUT

      # ── Create the Release ──────────────────────────────────────────────────
      - name: Create draft GitHub Release
        id: gh_release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Paracci ${{ github.ref_name }}"
          draft: true
          prerelease: false
          generate_release_notes: true
          body: |
            ## Paracci ${{ github.ref_name }}
            <!-- paracci-update: {"protocol_version": 4} -->

            ### 📦 Download

            | Platform | File | Notes |
            |----------|------|-------|
            | Windows installer | `Paracci-Setup-${{ github.ref_name }}.exe` | Standard Mode; per-user installation with uninstaller |
            | Windows portable | `Paracci-Portable-${{ github.ref_name }}.zip` | Extract and run; keeps data beside the executable |
            | macOS DMG | `Paracci-${{ steps.resolve.outputs.package_version }}-macOS.dmg` | Drag to Applications; not notarized, so first launch may require Open Anyway |
            | macOS compatibility | `Paracci-macOS.zip` | Retained bundle archive |
            | Linux AppImage | `Paracci-${{ steps.resolve.outputs.package_version }}-x86_64.AppImage` | Universal package; run `chmod +x` after download |
            | Linux Debian/Ubuntu | `paracci_${{ steps.resolve.outputs.package_version }}_amd64.deb` | Installs desktop and `.paracci` MIME registration |
            | Linux compatibility | `Paracci-Linux.zip` | Retained complete onedir archive |

            ---

            ### 🔐 Security & Integrity

            #### SHA-256 Checksums
            Published releases attach `SHA256SUMS.txt` and its offline Ed25519
            signature `SHA256SUMS.txt.sig`. Paracci verifies this signature
            before trusting installer checksums.

            To verify a downloaded package checksum after verifying the manifest signature:
            ```
            # Windows (PowerShell):  Get-FileHash Paracci-Setup-${{ github.ref_name }}.exe -Algorithm SHA256
            # Windows portable:     Get-FileHash Paracci-Portable-${{ github.ref_name }}.zip -Algorithm SHA256
            # macOS:                 shasum -a 256 Paracci-${{ steps.resolve.outputs.package_version }}-macOS.dmg
            # Linux:                 sha256sum Paracci-Linux.zip Paracci-${{ steps.resolve.outputs.package_version }}-x86_64.AppImage paracci_${{ steps.resolve.outputs.package_version }}_amd64.deb
            ```

            The macOS DMG is intentionally distributed without Apple notarization.
            On macOS Ventura or later, use **System Settings > Privacy & Security > Open Anyway**
            after the first blocked launch. On older releases, use
            **System Preferences > Security & Privacy > General > Open Anyway**.

            #### Build Provenance (Sigstore / SLSA Level 2)
            Each published application artifact has GitHub Actions build provenance.
            You can verify the attestation without trusting us:
            ```bash
            gh attestation verify Paracci-Setup-${{ github.ref_name }}.exe \
              --repo ${{ github.repository }}
            ```
            Or browse the attestations tab:
            https://github.com/${{ github.repository }}/attestations

            #### VirusTotal Scan
            _VirusTotal scan links are added automatically after the signed draft is published._
            > **Why might antivirus flag it?** PyInstaller bundles the Python interpreter
            > inside the executable. This "packing" technique is sometimes flagged as
            > heuristic-suspicious by AV engines even when the code is clean.
            > The source code is fully open and auditable above.

            ---

            > 🔍 Source code: All application logic is in this repository and open for audit.
          files: |
            ${{ steps.resolve.outputs.win_setup_file }}
            ${{ steps.resolve.outputs.win_portable_file }}
            ${{ steps.resolve.outputs.macos_file }}
            ${{ steps.resolve.outputs.macos_dmg_file }}
            ${{ steps.resolve.outputs.linux_zip_file }}
            ${{ steps.resolve.outputs.linux_appimage_file }}
            ${{ steps.resolve.outputs.linux_deb_file }}
            SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
