name: Build & Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# ─────────────────────────────────────────────────────────────────────────────
# Triggers:
#   • Push a tag like v1.2.3  → full build + GitHub Release + VT scan
#   • workflow_dispatch        → manual trigger (build artifacts only)
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write      # create GitHub Releases, update release body
  id-token: write      # GitHub OIDC → Sigstore build attestation (SLSA)
  attestations: write  # store build provenance attestation

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 1 — Test gate on all three platforms
  # ═══════════════════════════════════════════════════════════════════════════
  verify:
    name: Verify (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-2025]

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Linux test dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libegl1 libxcb-cursor0 libxcb-xinerama0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-render-util0 libxcb-shape0

      - name: Install liboqs C library
        uses: ./.github/actions/install-liboqs
        with:
          version: "0.15.0"
          install-prefix: ${{ runner.temp }}/_oqs

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --require-hashes -r requirements.lock
          python -m pip install --require-hashes -r requirements-dev.lock

      - name: Audit locked dependencies
        run: python -m pip_audit -r requirements.lock -r requirements-dev.lock

      - name: Run tests
        run: python -m pytest paracci/tests -q
        env:
          QT_QPA_PLATFORM: offscreen

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 2 — Build on all three platforms in parallel
  # ═══════════════════════════════════════════════════════════════════════════
  build:
    name: Build (${{ matrix.platform_id }})
    needs: [verify]
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2025
            platform_id: windows
            artifact_name: Paracci-Windows

          - os: macos-latest
            platform_id: macos
            artifact_name: Paracci-macOS

          - os: ubuntu-latest
            platform_id: linux
            artifact_name: Paracci-Linux

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      # ── 2. Set up Python ───────────────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"
          cache: "pip"

      # ── 3. Linux: GTK3 + WebKit2GTK system packages ────────────────────────
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            python3-gi python3-gi-cairo \
            gir1.2-gtk-3.0 gir1.2-webkit2-4.1 \
            libgirepository1.0-dev gcc libcairo2-dev \
            pkg-config python3-dev libglib2.0-dev \
            libegl1 libxcb-cursor0 libxcb-xinerama0

      - name: Install liboqs C library
        id: liboqs
        uses: ./.github/actions/install-liboqs
        with:
          version: "0.15.0"
          install-prefix: ${{ runner.temp }}/_oqs

      # ── 4. Install runtime + build dependencies ────────────────────────────
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --require-hashes -r requirements.lock

      - name: Install PyInstaller (Standard for macOS)
        if: runner.os == 'macOS'
        run: |
          python -m pip install --require-hashes -r requirements-dev.lock

      - name: Install PyInstaller (Compile from Source for Windows and Linux to eliminate False Positives)
        if: runner.os != 'macOS'
        run: |
          python -m pip install --require-hashes --no-binary pyinstaller -r requirements-dev.lock

      - name: Audit locked dependencies
        run: python -m pip_audit -r requirements.lock -r requirements-dev.lock

      - name: Inject release version metadata
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          python - <<'PY'
          import os, re
          from pathlib import Path

          tag = os.environ["RELEASE_TAG"]
          version = tag[1:] if tag.startswith("v") else tag
          match = re.fullmatch(r"(\d+)\.(\d+)\.(\d+)", version)
          if not match:
              raise SystemExit(f"Release tag must be vMAJOR.MINOR.PATCH, got {tag!r}")

          major, minor, patch = map(int, match.groups())
          version_tuple = f"({major}, {minor}, {patch}, 0)"

          def replace_once(text, pattern, replacement, label):
              updated, count = re.subn(pattern, replacement, text, count=1)
              if count != 1:
                  raise SystemExit(f"Expected exactly one {label} replacement, found {count}")
              return updated

          fv = Path("file_version_info.txt")
          text = fv.read_text(encoding="utf-8")
          text = replace_once(text, r"filevers=\(\d+,\s*\d+,\s*\d+,\s*\d+\)", f"filevers={version_tuple}", "filevers")
          text = replace_once(text, r"prodvers=\(\d+,\s*\d+,\s*\d+,\s*\d+\)", f"prodvers={version_tuple}", "prodvers")
          text = replace_once(text, r"StringStruct\('FileVersion',\s*'[^']*'\)", f"StringStruct('FileVersion', '{version}')", "FileVersion")
          text = replace_once(text, r"StringStruct\('ProductVersion',\s*'[^']*'\)", f"StringStruct('ProductVersion', '{version}')", "ProductVersion")
          fv.write_text(text, encoding="utf-8")

          spec = Path("paracci.spec")
          text = spec.read_text(encoding="utf-8")
          text = replace_once(text, r'"CFBundleVersion":\s*"[^"]*"', f'"CFBundleVersion": "{version}"', "CFBundleVersion")
          text = replace_once(text, r'"CFBundleShortVersionString":\s*"[^"]*"', f'"CFBundleShortVersionString": "{version}"', "CFBundleShortVersionString")
          spec.write_text(text, encoding="utf-8")

          print(f"Injected Paracci version {version}")
          PY

      - name: Verify release version metadata
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          tag = os.environ["RELEASE_TAG"]
          version = tag[1:] if tag.startswith("v") else tag
          major, minor, patch = map(int, version.split("."))
          version_tuple = f"({major}, {minor}, {patch}, 0)"

          checks = {
              "file_version_info.txt": [
                  f"filevers={version_tuple}",
                  f"prodvers={version_tuple}",
                  f"StringStruct('FileVersion', '{version}')",
                  f"StringStruct('ProductVersion', '{version}')",
              ],
              "paracci.spec": [
                  f'"CFBundleVersion": "{version}"',
                  f'"CFBundleShortVersionString": "{version}"',
              ],
          }

          missing = []
          for path, needles in checks.items():
              text = Path(path).read_text(encoding="utf-8")
              missing.extend(f"{path}: {needle}" for needle in needles if needle not in text)

          if missing:
              raise SystemExit("Version injection verification failed:\n" + "\n".join(missing))
          print(f"Verified injected version {version}")
          PY

      # ── 5. Build executable ────────────────────────────────────────────────
      - name: Build executable
        run: python build.py --clean
        env:
          QT_QPA_PLATFORM: offscreen   # suppress headless Qt warnings on Linux CI

      - name: Smoke test packaged ML-KEM
        shell: bash
        run: |
          python - <<'PY'
          import http.cookiejar
          import os
          import re
          import shutil
          import socket
          import subprocess
          import sys
          import tempfile
          import time
          import urllib.parse
          import urllib.request
          from pathlib import Path

          runner_os = os.environ["RUNNER_OS"]
          if runner_os == "Windows":
              executable = Path("builds/windows/Paracci.exe")
          elif runner_os == "macOS":
              app_executable = Path("builds/macos/Paracci.app/Contents/MacOS/Paracci")
              executable = app_executable if app_executable.exists() else Path("builds/macos/Paracci")
          else:
              executable = Path("builds/linux/Paracci")

          if not executable.exists():
              raise SystemExit(f"Packaged executable not found: {executable}")

          with socket.socket(socket.AF_INET, socket.SOCK_STREAM) as probe:
              probe.bind(("127.0.0.1", 0))
              port = probe.getsockname()[1]
          token = "paracci-release-smoke-token"
          origin = f"http://127.0.0.1:{port}"
          data_root = Path(tempfile.mkdtemp(prefix="paracci-smoke-")).resolve()

          env = os.environ.copy()
          for name in (
              "OQS_INSTALL_PATH",
              "LIBOQS_LIB_DIR",
              "LD_LIBRARY_PATH",
              "DYLD_LIBRARY_PATH",
          ):
              env.pop(name, None)
          env["PATH"] = os.pathsep.join(
              part
              for part in env.get("PATH", "").split(os.pathsep)
              if "_oqs" not in part.lower() and "liboqs" not in part.lower()
          )
          env["DATA_DIR"] = str(data_root / "data")
          env["PARACCI_LOOPBACK_TOKEN"] = token
          env["PYOQS_VERSION"] = "paracci-smoke-no-autoinstall"
          env["QT_QPA_PLATFORM"] = "offscreen"

          proc = subprocess.Popen(
              [str(executable), "--no-gui", "--port", str(port)],
              env=env,
              stdout=subprocess.PIPE,
              stderr=subprocess.STDOUT,
              text=True,
              errors="replace",
          )

          def stop_process():
              if proc.poll() is None:
                  proc.terminate()
                  try:
                      proc.wait(timeout=10)
                  except subprocess.TimeoutExpired:
                      proc.kill()
                      proc.wait(timeout=10)

          def output_tail():
              if not proc.stdout:
                  return ""
              try:
                  return proc.stdout.read()[-4000:]
              except Exception:
                  return ""

          def fail(message):
              stop_process()
              raise SystemExit(f"{message}\n--- packaged app output ---\n{output_tail()}")

          try:
              deadline = time.time() + 90
              while time.time() < deadline:
                  if proc.poll() is not None:
                      fail(f"Packaged app exited early with code {proc.returncode}")
                  try:
                      with socket.create_connection(("127.0.0.1", port), timeout=1):
                          break
                  except OSError:
                      time.sleep(1)
              else:
                  fail("Timed out waiting for packaged app to listen")

              jar = http.cookiejar.CookieJar()
              opener = urllib.request.build_opener(urllib.request.HTTPCookieProcessor(jar))

              def request(path, form=None, csrf=None):
                  headers = {"Host": f"127.0.0.1:{port}", "Origin": origin}
                  data = None
                  if form is not None:
                      data = urllib.parse.urlencode(form).encode("utf-8")
                      headers["Content-Type"] = "application/x-www-form-urlencoded"
                      headers["X-Paracci-Token"] = token
                      if csrf:
                          headers["X-CSRF-Token"] = csrf
                  req = urllib.request.Request(origin + path, data=data, headers=headers)
                  return opener.open(req, timeout=45)

              response = request(f"/__paracci_bootstrap?token={urllib.parse.quote(token)}&next=/")
              html = response.read().decode("utf-8", "replace")
              csrf_match = re.search(r'name="paracci-csrf-token"\s+content="([^"]+)"', html)
              if not csrf_match:
                  response = request("/unlock")
                  html = response.read().decode("utf-8", "replace")
                  csrf_match = re.search(r'name="paracci-csrf-token"\s+content="([^"]+)"', html)
              if not csrf_match:
                  fail("Could not extract CSRF token from packaged app")

              csrf = csrf_match.group(1)
              request("/unlock", {"pin": "Correct-Horse-95175328"}, csrf).read()
              request("/unlock/2fa/setup", {"action": "skip"}, csrf).read()
              response = request(
                  "/session/new",
                  {
                      "label": "Release smoke",
                      "session_ttl": "0",
                      "security_profile": "standard",
                  },
                  csrf,
              )
              body = response.read().decode("utf-8", "replace")
              final_url = response.geturl()

              if "/session/" not in final_url:
                  snippet = re.sub(r"\s+", " ", body)[:1000]
                  fail(f"ML-KEM session creation did not complete. Final URL: {final_url}. Body: {snippet}")

              print(f"Packaged ML-KEM smoke test passed: {final_url}")
          finally:
              stop_process()
              shutil.rmtree(data_root, ignore_errors=True)
          PY

      # ── 6. Normalize output path and compute SHA-256 ───────────────────────
      - name: Prepare asset (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $file = "builds\windows\Paracci.exe"
          $hash = (Get-FileHash $file -Algorithm SHA256).Hash.ToLower()
          "$hash  Paracci-Windows.exe" | Out-File -Encoding utf8 "builds\windows\SHA256SUMS.txt"
          Write-Host "SHA256: $hash"

      - name: Prepare asset (macOS)
        if: runner.os == 'macOS'
        run: |
          if [ -d "builds/macos/Paracci.app" ]; then
            cd builds/macos
            zip -r Paracci-macOS.zip Paracci.app
            sha256sum Paracci-macOS.zip > SHA256SUMS.txt
            rm -rf Paracci.app
          else
            chmod +x builds/macos/Paracci
            cd builds/macos
            mv Paracci Paracci-macOS
            sha256sum Paracci-macOS > SHA256SUMS.txt
          fi

      - name: Prepare asset (Linux)
        if: runner.os == 'Linux'
        run: |
          chmod +x builds/linux/Paracci
          cd builds/linux
          mv Paracci Paracci-Linux
          sha256sum Paracci-Linux > SHA256SUMS.txt
          
      # ── 7. GitHub Build Provenance Attestation (Sigstore / SLSA L2) ────────
      #    Generates a cryptographically signed attestation that this binary
      #    was built from THIS specific commit in THIS repository.
      #    Verifiable at: https://github.com/<owner>/<repo>/attestations
      - name: Attest Windows build provenance
        if: runner.os == 'Windows' && startsWith(github.ref, 'refs/tags/v')
        uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45  # v2
        with:
          subject-path: builds/windows/Paracci.exe

      - name: Attest macOS build provenance
        if: runner.os == 'macOS' && startsWith(github.ref, 'refs/tags/v')
        uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45  # v2
        with:
          subject-path: builds/macos/Paracci-macOS*

      - name: Attest Linux build provenance
        if: runner.os == 'Linux' && startsWith(github.ref, 'refs/tags/v')
        uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45  # v2
        with:
          subject-path: builds/linux/Paracci-Linux

      # ── 8. Upload artifacts ────────────────────────────────────────────────
      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: Paracci-Windows
          path: builds/windows/
          retention-days: 7

      - name: Upload artifact (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: Paracci-macOS
          path: builds/macos/
          retention-days: 7

      - name: Upload artifact (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: Paracci-Linux
          path: builds/linux/
          retention-days: 7

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 3 — Create GitHub Release
  # Runs only on version tags, after all builds succeed.
  # ═══════════════════════════════════════════════════════════════════════════
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    # Output the release upload_url so the VT job can add scan results later
    outputs:
      release_id: ${{ steps.gh_release.outputs.id }}

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: Paracci-Windows
          path: release-assets/windows

      - name: Download macOS artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: Paracci-macOS
          path: release-assets/macos

      - name: Download Linux artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: Paracci-Linux
          path: release-assets/linux

      # ── Merge per-platform SHA256 into one canonical file ──────────────────
      - name: Generate combined SHA256SUMS.txt
        run: |
          cat release-assets/windows/SHA256SUMS.txt \
              release-assets/macos/SHA256SUMS.txt \
              release-assets/linux/SHA256SUMS.txt \
            > SHA256SUMS.txt
          echo "=== SHA256SUMS.txt ==="
          cat SHA256SUMS.txt

      # ── Resolve final file names ────────────────────────────────────────────
      - name: Resolve release files
        id: resolve
        run: |
          WIN_FILE="release-assets/windows/Paracci.exe"
          LINUX_FILE="release-assets/linux/Paracci-Linux"
          chmod +x "$LINUX_FILE"

          # macOS: .zip bundle or bare binary
          if [ -f "release-assets/macos/Paracci-macOS.zip" ]; then
            MACOS_FILE="release-assets/macos/Paracci-macOS.zip"
          else
            MACOS_FILE="release-assets/macos/Paracci-macOS"
            chmod +x "$MACOS_FILE"
          fi

          echo "win_file=$WIN_FILE"     >> $GITHUB_OUTPUT
          echo "macos_file=$MACOS_FILE" >> $GITHUB_OUTPUT
          echo "linux_file=$LINUX_FILE" >> $GITHUB_OUTPUT

      # ── Create the Release ──────────────────────────────────────────────────
      - name: Create GitHub Release
        id: gh_release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Paracci ${{ github.ref_name }}"
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## Paracci ${{ github.ref_name }}

            ### 📦 Download

            | Platform | File | Notes |
            |----------|------|-------|
            | 🪟 Windows | `Paracci.exe` | Double-click to run — no Python needed |
            | 🍎 macOS | `Paracci-macOS.zip` | Unzip → drag to Applications |
            | 🐧 Linux | `Paracci-Linux` | `chmod +x Paracci-Linux && ./Paracci-Linux` |

            ---

            ### 🔐 Security & Integrity

            #### SHA-256 Checksums
            Verify your download matches `SHA256SUMS.txt` (attached below):
            ```
            # Windows (PowerShell):  Get-FileHash Paracci.exe -Algorithm SHA256
            # macOS / Linux:         sha256sum Paracci-Linux
            ```

            #### Build Provenance (Sigstore / SLSA Level 2)
            Every binary in this release was cryptographically signed by GitHub Actions.
            You can verify the attestation without trusting us:
            ```bash
            gh attestation verify Paracci.exe \
              --repo ${{ github.repository }}
            ```
            Or browse the attestations tab:
            https://github.com/${{ github.repository }}/attestations

            #### VirusTotal Scan
            _VirusTotal scan links are added automatically below after this release is published._
            > **Why might antivirus flag it?** PyInstaller bundles the Python interpreter
            > inside the executable. This "packing" technique is sometimes flagged as
            > heuristic-suspicious by AV engines even when the code is clean.
            > The source code is fully open and auditable above.

            ---

            > 🔍 Source code: All application logic is in this repository and open for audit.
          files: |
            ${{ steps.resolve.outputs.win_file }}
            ${{ steps.resolve.outputs.macos_file }}
            ${{ steps.resolve.outputs.linux_file }}
            SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 4 — VirusTotal Scan
  # Runs after the Release is published. Submits all 3 binaries to VT and
  # appends the scan report URLs to the release body automatically.
  #
  # SETUP REQUIRED:
  #   Add your free VirusTotal API key as a repository secret named VT_API_KEY:
  #   Repository → Settings → Secrets and variables → Actions → New secret
  #   Get a free key at: https://www.virustotal.com/gui/join-us
  # ═══════════════════════════════════════════════════════════════════════════
  virustotal:
    name: VirusTotal Scan
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: Paracci-Windows
          path: vt-scan/windows

      - name: Download macOS artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: Paracci-macOS
          path: vt-scan/macos

      - name: Download Linux artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: Paracci-Linux
          path: vt-scan/linux

      # Rename files to clean names for VT display
      - name: Normalize filenames for VT
        run: |
          mv vt-scan/windows/Paracci.exe        vt-scan/Paracci-Windows.exe || true
          mv vt-scan/linux/Paracci-Linux         vt-scan/Paracci-Linux       || true

          # macOS: prefer .zip, fall back to bare binary
          if [ -f "vt-scan/macos/Paracci-macOS.zip" ]; then
            mv vt-scan/macos/Paracci-macOS.zip   vt-scan/Paracci-macOS.zip
          else
            mv vt-scan/macos/Paracci-macOS        vt-scan/Paracci-macOS || true
          fi

          ls -lah vt-scan/

      # ── Submit to VirusTotal and append scan URLs to the release body ───────
      - name: VirusTotal Scan
        uses: crazy-max/ghaction-virustotal@d34968c958ae283fe976efed637081b9f9dcf74f  # v4
        with:
          vt_api_key: ${{ secrets.VT_API_KEY }}
          request_rate: 4          # free API: max 4 requests/min
          update_release_body: true
          github_token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            vt-scan/Paracci-Windows.exe
            vt-scan/Paracci-macOS.zip
            vt-scan/Paracci-macOS
            vt-scan/Paracci-Linux
