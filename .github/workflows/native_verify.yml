name: Native Verification

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-2025, ubuntu-22.04, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af  # v4.1.0
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Node dependencies and build frontend
        run: |
          npm ci
          npm run build

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"

      - name: Install liboqs C library
        uses: ./.github/actions/install-liboqs
        with:
          version: "0.15.0"
          install-prefix: ${{ runner.temp }}/_oqs

      - name: Install Ubuntu dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            gir1.2-gtk-3.0 gir1.2-webkit2-4.0 libwebkit2gtk-4.0-37 \
            libgirepository1.0-dev gcc libcairo2-dev pkg-config python3-dev libglib2.0-dev \
            libegl1 libxcb-cursor0 libxcb-xinerama0 libxcb-icccm4 \
            libxcb-image0 libxcb-keysyms1 libxcb-render-util0 libxcb-shape0

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --require-hashes -r requirements.lock
          python -m pip install --require-hashes -r requirements-dev.lock

      - name: Audit locked dependencies
        run: python -m pip_audit -r requirements.lock -r requirements-dev.lock

      - name: Install SQLCipher system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y sqlcipher libsqlcipher-dev

      - name: Install SQLCipher Python package (Linux)
        if: runner.os == 'Linux'
        run: python -m pip install sqlcipher3

      - name: Install SQLCipher Python package (Windows & macOS)
        if: runner.os != 'Linux'
        run: python -m pip install sqlcipher3-binary

      - name: Run tests
        run: python -m pytest paracci/tests -q
        env:
          QT_QPA_PLATFORM: offscreen

      - name: Run clipboard JavaScript tests
        run: node --test paracci/tests/test_session_clipboard.mjs

      - name: Run Guardian audit
        run: python paracci/audits/guardian.py

      - name: Check native launcher compiles
        run: python -m py_compile run.py paracci/desktop/services.py paracci/ui_api/facade.py paracci/bridge/worker.py
