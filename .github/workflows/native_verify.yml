name: Native Verification

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-2025, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install cmake and ninja
        uses: lukka/get-cmake@latest

      - name: Install OpenSSL headers (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libssl-dev gcc

      - name: Install OpenSSL headers (macOS)
        if: runner.os == 'macOS'
        run: brew install openssl

      - name: Build and install liboqs C library
        shell: bash
        run: |
          git clone --branch 0.15.0 --depth 1 https://github.com/open-quantum-safe/liboqs.git
          cmake_extra_flags=""
          if [ "$RUNNER_OS" = "Windows" ]; then
            cmake_extra_flags="-DCMAKE_WINDOWS_EXPORT_ALL_SYMBOLS=TRUE"
          fi
          cmake -S liboqs -B liboqs/build \
            -DBUILD_SHARED_LIBS=ON \
            -DCMAKE_BUILD_TYPE=Release \
            -DOQS_BUILD_ONLY_LIB=ON \
            -DOQS_DIST_BUILD=ON \
            -DCMAKE_INSTALL_PREFIX="${{ runner.temp }}/_oqs" \
            $cmake_extra_flags
          cmake --build liboqs/build --parallel 4
          cmake --build liboqs/build --target install
          rm -rf liboqs

      - name: Set OQS_INSTALL_PATH
        shell: bash
        run: echo "OQS_INSTALL_PATH=${{ runner.temp }}/_oqs" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --require-hashes -r requirements.lock
          python -m pip install --require-hashes -r requirements-dev.lock

      - name: Audit locked dependencies
        run: python -m pip_audit -r requirements.lock -r requirements-dev.lock

      - name: Install Ubuntu dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libxcb-cursor0 libxcb-xinerama0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-render-util0 libxcb-shape0

      - name: Run tests
        run: python -m pytest paracci/tests -q
        env:
          QT_QPA_PLATFORM: offscreen

      - name: Run Guardian audit
        run: python paracci/audits/guardian.py

      - name: Check native launcher compiles
        run: python -m py_compile run.py paracci/desktop/services.py paracci/ui_api/facade.py paracci/bridge/worker.py
